name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm --filter @playbykey/theory typecheck

      - name: Test
        run: pnpm --filter @playbykey/theory test

      - name: Build @playbykey/theory
        run: pnpm --filter @playbykey/theory build

      - name: Typecheck @playbykey/theory-mcp
        run: pnpm --filter @playbykey/theory-mcp typecheck

      - name: Test @playbykey/theory-mcp
        run: pnpm --filter @playbykey/theory-mcp test

      - name: Build @playbykey/theory-mcp
        run: pnpm --filter @playbykey/theory-mcp build

      - name: Build theory-docs
        run: pnpm --filter theory-docs build
