<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Left amber accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#f59e0b"/>

  <!-- Headline -->
  <text x="80" y="230" font-family="DM Sans, system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#f5f5f5" letter-spacing="-1">Theory Engine</text>

  <!-- Package name in amber monospace -->
  <text x="84" y="300" font-family="ui-monospace, Cascadia Code, Fira Code, Consolas, monospace" font-size="34" fill="#f59e0b">@playbykey/theory</text>

  <!-- Description -->
  <text x="80" y="370" font-family="DM Sans, system-ui, -apple-system, sans-serif" font-size="26" fill="#a3a3a3">Zero-dependency TypeScript music theory engine.</text>
  <text x="80" y="406" font-family="DM Sans, system-ui, -apple-system, sans-serif" font-size="26" fill="#a3a3a3">Scales, modes, intervals, key relationships.</text>

  <!-- Site URL -->
  <text x="80" y="554" font-family="DM Sans, system-ui, -apple-system, sans-serif" font-size="20" fill="#525252">theory-engine.docs.playbykey.com</text>

  <!-- PlayByKey badge -->
  <text x="80" y="588" font-family="DM Sans, system-ui, -apple-system, sans-serif" font-size="18" fill="#404040">by PlayByKey</text>

  <!-- Piano keys  right side decoration -->
  <!-- White key bodies (dark background, outlined) -->
  <rect x="810" y="120" width="58" height="390" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="878" y="120" width="58" height="390" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="946" y="120" width="58" height="390" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="1014" y="120" width="58" height="390" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="1082" y="120" width="58" height="390" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Black keys  first one in amber (highlighted), rest dark -->
  <rect x="847" y="120" width="40" height="235" rx="4" fill="#f59e0b"/>
  <rect x="915" y="120" width="40" height="235" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="983" y="120" width="40" height="235" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="1051" y="120" width="40" height="235" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
</svg>
